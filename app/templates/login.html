{% extends "base.html" %}
{% block title %}Sign In - Traveloop SaaS{% endblock %}

{% block public_content %}
<div class="row justify-content-center align-items-center min-vh-100 mt-n5">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center p-3 mb-3">
                <i class="fa-solid fa-plane-departure fs-2"></i>
            </div>
            <h2 class="fw-bold text-dark">Welcome back</h2>
            <p class="text-muted">Enter your credentials to access your workspace.</p>
        </div>

        <div class="card border-0 shadow-lg p-4 p-md-5 bg-white" style="border-radius: var(--border-radius);">
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-4">
                    <label for="email" class="form-label fw-bold text-dark small text-uppercase tracking-wider">Work Email</label>
                    <input type="email" class="form-control form-control-lg bg-light" id="email" name="email" placeholder="name@company.com" required>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label fw-bold text-dark small text-uppercase tracking-wider">Password</label>
                        <a href="#" class="text-primary text-decoration-none small fw-medium">Forgot password?</a>
                    </div>
                    <input type="password" class="form-control form-control-lg bg-light" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="d-grid mt-5">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm">Sign In to Workspace</button>
                </div>
            </form>
        </div>
        
        <p class="text-center mt-4 text-muted">
            Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary fw-bold text-decoration-none border-bottom border-primary pb-1">Sign up for free</a>
        </p>
    </div>
</div>
{% endblock %}
