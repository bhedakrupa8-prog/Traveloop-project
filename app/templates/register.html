{% extends "base.html" %}
{% block title %}Sign Up - Traveloop SaaS{% endblock %}

{% block public_content %}
<div class="row justify-content-center align-items-center min-vh-100 mt-n5">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">Create your account</h2>
            <p class="text-muted">Start organizing trips like a professional today.</p>
        </div>

        <div class="card border-0 shadow-lg p-4 p-md-5 bg-white" style="border-radius: var(--border-radius);">
            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="mb-4">
                    <label for="username" class="form-label fw-bold text-dark small text-uppercase tracking-wider">Full Name</label>
                    <input type="text" class="form-control form-control-lg bg-light" id="username" name="username" placeholder="Jane Doe" required>
                </div>
                <div class="mb-4">
                    <label for="email" class="form-label fw-bold text-dark small text-uppercase tracking-wider">Work Email</label>
                    <input type="email" class="form-control form-control-lg bg-light" id="email" name="email" placeholder="name@company.com" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-bold text-dark small text-uppercase tracking-wider">Password</label>
                    <input type="password" class="form-control form-control-lg bg-light" id="password" name="password" placeholder="Must be at least 8 characters" required>
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault" required>
                    <label class="form-check-label text-muted small" for="flexCheckDefault">
                        I agree to the <a href="#" class="text-primary text-decoration-none">Terms of Service</a> and <a href="#" class="text-primary text-decoration-none">Privacy Policy</a>.
                    </label>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm">Create Workspace</button>
                </div>
            </form>
        </div>
        
        <p class="text-center mt-4 text-muted">
            Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary fw-bold text-decoration-none border-bottom border-primary pb-1">Sign in instead</a>
        </p>
    </div>
</div>
{% endblock %}
